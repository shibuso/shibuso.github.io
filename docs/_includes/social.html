<ul class="social-media-list">
  {%- if site.github_username -%}<li><a href="https://github.com/{{ site.github_username| cgi_escape | escape }}">GitHub: {{ site.github_username| escape }}</a></li>{%- endif -%}
  {%- if site.twitter_username -%}<li><a href="https://www.twitter.com/{{ site.twitter_username| cgi_escape | escape }}">Twitter: {{ site.twitter_username| escape }}</a></li>{%- endif -%}
</ul>
